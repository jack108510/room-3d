<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yacht Interior</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #hint {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.28); font-family: 'Georgia', serif;
      font-size: 11px; letter-spacing: .14em; pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hint">DRAG TO LOOK &nbsp;·&nbsp; SCROLL TO ZOOM</div>

  <!-- Three.js core -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <!-- Post-processing stack -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

  <script>
  (function() {

    // ── Renderer ──────────────────────────────────────────────────────────
    var renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.physicallyCorrectLights = true;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.85;
    renderer.outputEncoding = THREE.sRGBEncoding;
    document.body.appendChild(renderer.domElement);

    var scene = new THREE.Scene();
    scene.background = new THREE.Color(0x060c14);

    var camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.04, 25);
    camera.position.set(0, 0.45, 3.0);

    var controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enablePan     = false;
    controls.enableDamping = true;
    controls.dampingFactor = 0.04;
    controls.rotateSpeed   = 0.09;
    controls.zoomSpeed     = 0.22;
    controls.minDistance   = 0.7;
    controls.maxDistance   = 4.2;
    controls.maxPolarAngle = Math.PI * 0.53;
    controls.minPolarAngle = Math.PI * 0.30;
    controls.target.set(0, 0.1, -0.2);
    controls.update();

    // ── Post-processing ───────────────────────────────────────────────────
    var composer = new THREE.EffectComposer(renderer);
    composer.addPass(new THREE.RenderPass(scene, camera));

    // Bloom — makes lights glow like real bulbs
    var bloom = new THREE.UnrealBloomPass(
      new THREE.Vector2(innerWidth, innerHeight),
      0.65,   // strength
      0.45,   // radius
      0.72    // threshold
    );
    composer.addPass(bloom);

    // Custom: vignette + film grain + warm color grade
    var FXShader = {
      uniforms: {
        tDiffuse:    { value: null },
        uTime:       { value: 0 },
        uVigOff:     { value: 0.38 },
        uVigDark:    { value: 1.55 },
        uGrain:      { value: 0.038 },
        uContrast:   { value: 1.06 }
      },
      vertexShader: [
        'varying vec2 vUv;',
        'void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }'
      ].join('\n'),
      fragmentShader: [
        'uniform sampler2D tDiffuse;',
        'uniform float uTime, uVigOff, uVigDark, uGrain, uContrast;',
        'varying vec2 vUv;',
        'float rand(vec2 co){ return fract(sin(dot(co,vec2(12.9898,78.233)))*43758.5453); }',
        'void main(){',
        '  vec4 c = texture2D(tDiffuse, vUv);',
        // Vignette
        '  vec2 uv2 = (vUv - 0.5) * 2.0;',
        '  float v = 1.0 - smoothstep(uVigOff, uVigOff + 0.7, dot(uv2, uv2));',
        '  c.rgb *= mix(uVigDark * 0.35, 1.0, v);',
        // Contrast
        '  c.rgb = (c.rgb - 0.5) * uContrast + 0.5;',
        // Warm color grade (amber/gold)
        '  c.r = c.r * 1.06;',
        '  c.g = c.g * 0.97;',
        '  c.b = c.b * 0.88;',
        // Subtle chromatic aberration
        '  float ca = 0.0008;',
        '  c.r = mix(c.r, texture2D(tDiffuse, vUv + vec2(ca,0.0)).r, 0.5);',
        '  c.b = mix(c.b, texture2D(tDiffuse, vUv - vec2(ca,0.0)).b, 0.5);',
        // Film grain
        '  float g = rand(vUv + fract(uTime * 0.037)) * uGrain;',
        '  c.rgb += g - uGrain * 0.5;',
        '  c.rgb = clamp(c.rgb, 0.0, 1.0);',
        '  gl_FragColor = c;',
        '}'
      ].join('\n')
    };
    var fxPass = new THREE.ShaderPass(FXShader);
    fxPass.renderToScreen = true;
    composer.addPass(fxPass);

    // ── Room ──────────────────────────────────────────────────────────────
    var W = 5.8, H = 2.5, D = 9.0;
    var hw = W/2, hh = H/2, hd = D/2;

    // ── Lighting — dramatic & layered ─────────────────────────────────────

    // Very dim ambient — forces lights to do the work
    scene.add(new THREE.AmbientLight(0xfff0d8, 0.18));

    // Hemisphere sky/ground for subtle fill
    scene.add(new THREE.HemisphereLight(0xffeedd, 0x3a2808, 0.3));

    // Recessed ceiling downlights
    var ceilLights = [];
    [-2.2, 0, 2.2].forEach(function(lz, li) {
      var l = new THREE.PointLight(0xfff5e0, 90, 4.5, 2);
      l.position.set(0, hh - 0.06, lz);
      l.castShadow = true;
      l.shadow.mapSize.set(1024, 1024);
      l.shadow.radius = 4;
      l.shadow.bias = -0.002;
      scene.add(l);
      ceilLights.push(l);

      // Emissive disc for visible bulb
      var disc = new THREE.Mesh(
        new THREE.CircleGeometry(0.055, 20),
        new THREE.MeshBasicMaterial({ color: 0xfffce8 })
      );
      disc.rotation.x = Math.PI/2;
      disc.position.set(0, hh - 0.001, lz);
      scene.add(disc);
    });

    // Porthole sunlight shafts (port side, 2 sources)
    var portLights = [];
    [-1.6, 0.9].forEach(function(pz) {
      var pl = new THREE.SpotLight(0xfff8e0, 4.5, 9, Math.PI/9, 0.4, 1.5);
      pl.position.set(-hw - 0.4, 0.3, pz);
      pl.target.position.set(1.5, -0.5, pz + 0.3);
      pl.castShadow = true;
      pl.shadow.mapSize.set(1024, 1024);
      pl.shadow.radius = 3;
      scene.add(pl); scene.add(pl.target);
      portLights.push(pl);
    });

    // Starboard porthole fill
    var starPL = new THREE.SpotLight(0xffe8c0, 2.5, 7, Math.PI/10, 0.5, 2);
    starPL.position.set(hw + 0.4, 0.3, -0.5);
    starPL.target.position.set(-1.0, -0.5, -0.5);
    starPL.castShadow = true; scene.add(starPL); scene.add(starPL.target);
    portLights.push(starPL);

    // Warm bounce off teak floor
    var bounce = new THREE.PointLight(0xffaa40, 12, 3.5, 2);
    bounce.position.set(0, -hh + 0.08, 0);
    scene.add(bounce);

    // ── Texture utilities ─────────────────────────────────────────────────

    function noise(ctx, w, h, a, count) {
      count = count || 5000;
      for (var i = 0; i < count; i++) {
        var al = Math.random() * a;
        ctx.fillStyle = Math.random() > 0.5
          ? 'rgba(255,255,255,'+al+')' : 'rgba(0,0,0,'+al+')';
        ctx.fillRect(Math.random()*w, Math.random()*h, 1+Math.random()*1.5, 1);
      }
    }

    function makeTeakFloor() {
      var c = document.createElement('canvas'); c.width=2048; c.height=1024;
      var x = c.getContext('2d');
      x.fillStyle='#2a1406'; x.fillRect(0,0,2048,1024);
      var ph = 32;
      for (var row=0; row < Math.ceil(1024/ph); row++) {
        var py = row * ph;
        var isHolly = ((row % 8) === 4);
        for (var col=0; col<2048; col+=420) {
          if (isHolly) {
            x.fillStyle='hsl(40,'+(15+Math.random()*8)+'%,'+(82+Math.random()*8)+'%)';
            x.fillRect(col, py+1, 418, ph-2);
          } else {
            var hue=22+Math.random()*12, lit=22+Math.random()*14;
            var g=x.createLinearGradient(col,py,col+420,py);
            g.addColorStop(0,'hsl('+hue+',52%,'+lit+'%)');
            g.addColorStop(0.25,'hsl('+(hue+5)+',48%,'+(lit+9)+'%)');
            g.addColorStop(0.6,'hsl('+hue+',50%,'+(lit+3)+'%)');
            g.addColorStop(1,'hsl('+(hue+3)+',49%,'+(lit+1)+'%)');
            x.fillStyle=g; x.fillRect(col, py+1, 420, ph-2);
            // grain lines
            x.strokeStyle='rgba(0,0,0,0.055)'; x.lineWidth=0.8;
            for (var gi=0;gi<14;gi++){
              var gx2=col+Math.random()*420;
              x.beginPath(); x.moveTo(gx2,py); x.lineTo(gx2+(Math.random()-.5)*22,py+ph); x.stroke();
            }
            // pore shadows
            for (var pi2=0;pi2<6;pi2++){
              x.fillStyle='rgba(0,0,0,'+(0.04+Math.random()*0.06)+')';
              x.fillRect(col+Math.random()*418, py+2+Math.random()*(ph-4), 2+Math.random()*4, 1);
            }
          }
        }
        x.fillStyle='#100802'; x.fillRect(0,py,2048,1);
      }
      noise(x,2048,1024,0.018,8000);
      var t=new THREE.CanvasTexture(c);
      t.wrapS=t.wrapT=THREE.RepeatWrapping;
      t.repeat.set(2,3.5);
      t.encoding=THREE.sRGBEncoding;
      return t;
    }

    function makeHullWall() {
      var c = document.createElement('canvas'); c.width=2048; c.height=512;
      var x = c.getContext('2d');
      // White gelcoat base with very subtle curvature gradient
      var bg=x.createLinearGradient(0,0,0,512);
      bg.addColorStop(0,'#f6f2ec'); bg.addColorStop(0.5,'#f0ece4'); bg.addColorStop(1,'#e8e2d8');
      x.fillStyle=bg; x.fillRect(0,0,2048,512);
      // Panel lines (moulded fiberglass panels)
      x.strokeStyle='rgba(160,148,132,0.3)'; x.lineWidth=1.5;
      [340,680,1020,1360,1700].forEach(function(lx){
        x.beginPath(); x.moveTo(lx,0); x.lineTo(lx,512); x.stroke();
      });
      // Teak inlay strips
      [75,100,125, 310,335,360].forEach(function(ty){
        var hue=22+Math.random()*10, lit=26+Math.random()*10;
        x.fillStyle='hsl('+hue+',54%,'+lit+'%)';
        x.fillRect(0,ty,2048,22);
        x.strokeStyle='rgba(0,0,0,0.06)'; x.lineWidth=0.8;
        for (var gi=0;gi<30;gi++){
          var gx2=Math.random()*2048;
          x.beginPath(); x.moveTo(gx2,ty); x.lineTo(gx2+(Math.random()-.5)*15,ty+22); x.stroke();
        }
        x.fillStyle='rgba(0,0,0,0.12)'; x.fillRect(0,ty,2048,1.5);
        x.fillStyle='rgba(255,255,255,0.14)'; x.fillRect(0,ty+20.5,2048,1.5);
      });
      // Lacquer reflection streak
      var ref=x.createLinearGradient(0,0,2048,0);
      ref.addColorStop(0,'rgba(255,255,255,0)');
      ref.addColorStop(0.3,'rgba(255,255,255,0.06)');
      ref.addColorStop(0.7,'rgba(255,255,255,0.03)');
      ref.addColorStop(1,'rgba(255,255,255,0)');
      x.fillStyle=ref; x.fillRect(0,150,2048,60);
      noise(x,2048,512,0.012,4000);
      var t=new THREE.CanvasTexture(c);
      t.wrapS=t.wrapT=THREE.RepeatWrapping;
      t.repeat.set(3,1);
      t.encoding=THREE.sRGBEncoding;
      return t;
    }

    function makeCeilingTex() {
      var c=document.createElement('canvas'); c.width=1024; c.height=1024;
      var x=c.getContext('2d');
      x.fillStyle='#f5f2ec'; x.fillRect(0,0,1024,1024);
      x.strokeStyle='rgba(180,170,155,0.2)'; x.lineWidth=1;
      [256,512,768].forEach(function(l){
        x.beginPath(); x.moveTo(l,0); x.lineTo(l,1024); x.stroke();
        x.beginPath(); x.moveTo(0,l); x.lineTo(1024,l); x.stroke();
      });
      noise(x,1024,1024,0.01,3000);
      var t=new THREE.CanvasTexture(c);
      t.wrapS=t.wrapT=THREE.RepeatWrapping;
      t.repeat.set(2,2);
      t.encoding=THREE.sRGBEncoding;
      return t;
    }

    function makeOceanTex() {
      var c=document.createElement('canvas'); c.width=512; c.height=512;
      var x=c.getContext('2d');
      var sky=x.createLinearGradient(0,0,0,260);
      sky.addColorStop(0,'#0d2a5a'); sky.addColorStop(0.5,'#1a5098'); sky.addColorStop(0.85,'#4890c8'); sky.addColorStop(1,'#70b8e8');
      x.fillStyle=sky; x.fillRect(0,0,512,260);
      // Clouds
      x.fillStyle='rgba(220,235,255,0.65)';
      [[70,55,80,22],[200,38,110,20],[380,50,90,18],[140,75,60,14],[450,72,70,16]].forEach(function(cl){
        x.beginPath(); x.ellipse(cl[0],cl[1],cl[2],cl[3],0,0,Math.PI*2); x.fill();
      });
      // Horizon glow
      x.fillStyle='rgba(255,240,180,0.2)'; x.fillRect(0,240,512,30);
      var sea=x.createLinearGradient(0,260,0,512);
      sea.addColorStop(0,'#1848a0'); sea.addColorStop(0.4,'#103080'); sea.addColorStop(1,'#081840');
      x.fillStyle=sea; x.fillRect(0,260,512,252);
      // Sun glint
      x.fillStyle='rgba(255,240,140,0.3)'; x.fillRect(215,265,80,70);
      x.fillStyle='rgba(255,240,140,0.12)'; x.fillRect(180,335,150,60);
      // Wave caps
      x.strokeStyle='rgba(160,210,255,0.4)'; x.lineWidth=1.5;
      for (var wy=278;wy<505;wy+=16){
        x.beginPath();
        for (var wx=0;wx<512;wx+=36){
          x.moveTo(wx,wy); x.quadraticCurveTo(wx+9,wy-3.5,wx+18,wy); x.quadraticCurveTo(wx+27,wy+3.5,wx+36,wy);
        }
        x.stroke();
      }
      var t=new THREE.CanvasTexture(c);
      t.encoding=THREE.sRGBEncoding;
      return t;
    }

    // ── Art ───────────────────────────────────────────────────────────────
    function makeArt(style) {
      var c=document.createElement('canvas'); c.width=700; c.height=480;
      var x=c.getContext('2d');

      if (style===0) {
        // Tall ship — old master oil painting
        var bg=x.createLinearGradient(0,0,0,480);
        bg.addColorStop(0,'#0e1624'); bg.addColorStop(0.35,'#1e3858'); bg.addColorStop(0.65,'#5888a8'); bg.addColorStop(1,'#3868a0');
        x.fillStyle=bg; x.fillRect(0,0,700,480);
        // Clouds — textured
        x.fillStyle='rgba(200,215,230,0.5)';
        [[90,55,120,38],[280,38,140,32],[480,52,110,30],[200,80,80,22],[390,82,95,26]].forEach(function(cl){
          for(var ci=0;ci<5;ci++){x.beginPath();x.ellipse(cl[0]+(Math.random()-0.5)*cl[2]*.6,cl[1]+(Math.random()-0.5)*cl[3],cl[2]*.5+Math.random()*cl[2]*.3,cl[3]*.6+Math.random()*cl[3]*.3,0,0,Math.PI*2);x.globalAlpha=0.3+Math.random()*0.3;x.fill();}
        });
        x.globalAlpha=1;
        // Sea
        var sea2=x.createLinearGradient(0,260,0,480);
        sea2.addColorStop(0,'#1e4878'); sea2.addColorStop(1,'#081828');
        x.fillStyle=sea2; x.fillRect(0,265,700,215);
        x.strokeStyle='rgba(140,190,230,0.35)'; x.lineWidth=1.8;
        for(var wy=278;wy<475;wy+=16){x.beginPath();for(var wx=0;wx<700;wx+=50){x.moveTo(wx,wy);x.quadraticCurveTo(wx+12,wy-5,wx+25,wy);x.quadraticCurveTo(wx+38,wy+5,wx+50,wy);}x.stroke();}
        // Hull
        x.fillStyle='#0a0806';
        x.beginPath(); x.moveTo(240,262); x.lineTo(460,262); x.lineTo(478,288); x.lineTo(222,288); x.closePath(); x.fill();
        x.fillStyle='rgba(165,45,25,0.9)';
        x.beginPath(); x.moveTo(245,257); x.lineTo(455,257); x.lineTo(460,262); x.lineTo(240,262); x.closePath(); x.fill();
        // Gunports
        x.fillStyle='rgba(0,0,0,0.7)';
        [268,298,328,358,388,418].forEach(function(gx){x.fillRect(gx,260,14,8);});
        // Masts
        x.strokeStyle='#4a2e08'; x.lineWidth=4.5;
        [[288,257,282,68],[350,257,348,55],[408,257,405,75]].forEach(function(m){x.beginPath();x.moveTo(m[0],m[1]);x.lineTo(m[2],m[3]);x.stroke();});
        x.lineWidth=2;
        [[282,68,348,55],[348,55,405,75]].forEach(function(m){x.beginPath();x.moveTo(m[0],m[1]);x.lineTo(m[2],m[3]);x.stroke();});
        // Sails — cream with age
        [['#f0e8c8',282,72,340,105,288,257,282,72],['#ece0b8',282,72,232,115,270,257,282,72]].forEach(function(s){
          x.fillStyle=s[0]; x.beginPath(); x.moveTo(s[1],s[2]); x.quadraticCurveTo(s[3],s[4],s[5],s[6]); x.lineTo(s[1],s[2]); x.fill();
        });
        x.fillStyle='#f0e8c8';
        [[348,58,408,90,408,257,348,58],[348,58,292,95,290,257,348,58],[405,78,448,105,450,255,405,78]].forEach(function(s){
          x.beginPath(); x.moveTo(s[0],s[1]); x.quadraticCurveTo(s[2],s[3],s[4],s[5]); x.lineTo(s[0],s[1]); x.closePath(); x.fill();
        });
        // Rigging
        x.strokeStyle='rgba(50,28,8,0.55)'; x.lineWidth=1;
        [[282,68,220,288],[282,68,478,288],[348,55,220,288],[348,55,478,288],[405,75,478,288]].forEach(function(l){x.beginPath();x.moveTo(l[0],l[1]);x.lineTo(l[2],l[3]);x.stroke();});
        // Vignette edges (oil painting feel)
        var vig=x.createRadialGradient(350,240,100,350,240,370);
        vig.addColorStop(0,'rgba(0,0,0,0)'); vig.addColorStop(1,'rgba(0,0,0,0.55)');
        x.fillStyle=vig; x.fillRect(0,0,700,480);

      } else if (style===1) {
        // Vintage nautical chart
        var aged=x.createLinearGradient(0,0,700,480);
        aged.addColorStop(0,'#f2e8c8'); aged.addColorStop(0.5,'#eeddb8'); aged.addColorStop(1,'#e8d4a8');
        x.fillStyle=aged; x.fillRect(0,0,700,480);
        // Water texture (light blue wash)
        x.fillStyle='rgba(140,180,220,0.18)'; x.fillRect(0,0,700,480);
        // Age stains
        for(var ai=0;ai<2000;ai++){
          x.fillStyle='rgba('+(100+Math.floor(Math.random()*60))+','+(80+Math.floor(Math.random()*40))+',30,'+(Math.random()*0.05)+')';
          x.fillRect(Math.random()*700,Math.random()*480,2+Math.random()*4,1+Math.random()*3);
        }
        // Border
        x.strokeStyle='#7a5c18'; x.lineWidth=3.5; x.strokeRect(14,14,672,452);
        x.strokeStyle='#a07828'; x.lineWidth=1; x.strokeRect(20,20,660,440);
        // Coastlines
        x.strokeStyle='#5a3808'; x.lineWidth=1.5; x.fillStyle='rgba(180,158,100,0.45)';
        x.beginPath(); x.moveTo(30,30); x.bezierCurveTo(100,55,130,110,110,165); x.bezierCurveTo(90,220,40,235,30,210); x.closePath(); x.fill(); x.stroke();
        x.beginPath(); x.moveTo(180,30); x.bezierCurveTo(260,48,320,85,340,140); x.bezierCurveTo(360,195,330,240,280,250); x.bezierCurveTo(230,260,190,230,180,180); x.bezierCurveTo(170,130,178,70,180,30); x.closePath(); x.fill(); x.stroke();
        x.beginPath(); x.moveTo(500,30); x.bezierCurveTo(570,50,620,100,630,150); x.bezierCurveTo(640,200,610,240,670,260); x.lineTo(670,30); x.closePath(); x.fill(); x.stroke();
        // Depth soundings
        x.fillStyle='#1a3050'; x.font='bold 11px Georgia';
        [[80,310,'14f'],[140,350,'22f'],[220,330,'35f'],[310,340,'48f'],[390,310,'55f'],[460,355,'62f'],[80,420,'17f'],[250,430,'40f'],[400,420,'58f']].forEach(function(d){x.fillText(d[2],d[0],d[1]);});
        // Shipping lanes
        x.setLineDash([5,7]); x.strokeStyle='rgba(70,80,160,0.5)'; x.lineWidth=1.5;
        x.beginPath(); x.moveTo(30,285); x.bezierCurveTo(200,265,380,295,670,250); x.stroke();
        x.beginPath(); x.moveTo(30,330); x.bezierCurveTo(200,350,380,335,670,300); x.stroke();
        x.setLineDash([]);
        // Compass rose
        var crx=570,cry=380,crr=58;
        x.strokeStyle='#5a3808'; x.fillStyle='#5a3808'; x.lineWidth=1.5;
        for(var di=0;di<16;di++){var ang=(di/16)*Math.PI*2;x.beginPath();x.moveTo(crx,cry);x.lineTo(crx+Math.cos(ang)*crr*(di%4===0?1:0.65),cry+Math.sin(ang)*crr*(di%4===0?1:0.65));x.stroke();}

    addPainting([-hw+0.03,0.38, 1.6],  Math.PI/2, 2);  // storm
    addPainting([ hw-0.03,0.42,-2.8], -Math.PI/2, 1);  // chart

    // ── Resize ────────────────────────────────────────────────────────────
    window.addEventListener('resize',function(){
      camera.aspect=innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth,innerHeight);
      composer.setSize(innerWidth,innerHeight);
      bloom.resolution.set(innerWidth,innerHeight);
    });

    // ── Loop ──────────────────────────────────────────────────────────────
    var clk=new THREE.Clock();
    (function animate(){
      requestAnimationFrame(animate);
      var t=clk.getElapsedTime();
      // Update FX shader time (for grain animation)
      fxPass.uniforms.uTime.value=t;
      // Porthole shimmer (ocean caustic flicker)
      portLights.forEach(function(pl,i){
        pl.intensity=(i<2?4.5:2.5)+Math.sin(t*(0.7+i*0.3))*0.4+Math.sin(t*(1.9+i*0.2))*0.2;
      });
      // Very gentle boat sway
      var sway=Math.sin(t*0.35)*0.0004+Math.sin(t*0.22)*0.0003;
      camera.position.y+=sway;
      camera.position.x+=Math.cos(t*0.28)*0.00015;
      controls.update();
      composer.render();
    })();

  })();
  </script>
</body>
</html>
