<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yacht Interior</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #hint {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.3); font-family: 'Georgia', serif;
      font-size: 11px; letter-spacing: .12em; pointer-events: none;
      text-shadow: 0 1px 6px #000;
    }
  </style>
</head>
<body>
  <div id="hint">DRAG TO LOOK &nbsp;·&nbsp; SCROLL TO ZOOM</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <script>
  (function() {

    // ── Renderer ──────────────────────────────────────────────────────────
    var renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.physicallyCorrectLights = true;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;
    renderer.outputEncoding = THREE.sRGBEncoding;
    document.body.appendChild(renderer.domElement);

    var scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d1a2a);
    scene.fog = new THREE.Fog(0x0d1a2a, 10, 20);

    var camera = new THREE.PerspectiveCamera(62, innerWidth / innerHeight, 0.05, 30);
    camera.position.set(0, 0.4, 2.8);

    var controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enablePan     = false;
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.rotateSpeed   = 0.10;   // very slow
    controls.zoomSpeed     = 0.25;   // very slow zoom
    controls.minDistance   = 0.6;
    controls.maxDistance   = 4.5;
    controls.maxPolarAngle = Math.PI * 0.55;
    controls.minPolarAngle = Math.PI * 0.28;
    controls.target.set(0, 0.1, -0.3);
    controls.update();

    // ── Yacht dimensions (saloon) ─────────────────────────────────────────
    var W = 5.8, H = 2.5, D = 8.5;
    var hw = W/2, hh = H/2, hd = D/2;

    // ── Lighting ──────────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xfff8e8, 0.4));

    // Overhead recessed lights (3 along ceiling)
    [-2, 0, 2].forEach(function(lz) {
      var l = new THREE.PointLight(0xfff5e0, 60, 4, 2);
      l.position.set(0, hh - 0.08, lz);
      l.castShadow = true;
      l.shadow.mapSize.set(512, 512);
      scene.add(l);
      // Recessed light housing
      var recMesh = new THREE.Mesh(
        new THREE.CylinderGeometry(0.06, 0.06, 0.04, 12),
        new THREE.MeshBasicMaterial({ color: 0xfffee8 })
      );
      recMesh.position.set(0, hh - 0.01, lz);
      scene.add(recMesh);
    });

    // Porthole daylight — warm ocean sunlight from both sides
    var sun1 = new THREE.SpotLight(0xfff0d0, 3.0, 8, Math.PI / 8, 0.5);
    sun1.position.set(-hw - 0.5, 0.3, -1.5);
    sun1.target.position.set(0.5, -0.2, -1.5);
    sun1.castShadow = true;
    sun1.shadow.mapSize.set(1024, 1024);
    scene.add(sun1); scene.add(sun1.target);

    var sun2 = new THREE.SpotLight(0xfff0d0, 1.5, 7, Math.PI / 9, 0.6);
    sun2.position.set(-hw - 0.5, 0.3, 1.0);
    sun2.target.position.set(0.5, -0.2, 1.0);
    sun2.castShadow = true;
    scene.add(sun2); scene.add(sun2.target);

    // Warm bounce from teak floor
    var bounce = new THREE.PointLight(0xffcc80, 10, 4, 2);
    bounce.position.set(0, -hh + 0.1, 0);
    scene.add(bounce);

    // ── Texture makers ────────────────────────────────────────────────────

    function noise(ctx, w, h, a) {
      for (var i = 0; i < 6000; i++) {
        var al = Math.random() * a;
        ctx.fillStyle = Math.random() > 0.5
          ? 'rgba(255,255,255,' + al + ')' : 'rgba(0,0,0,' + al + ')';
        ctx.fillRect(Math.random()*w, Math.random()*h, 1+Math.random(), 1+Math.random());
      }
    }

    // Teak & holly sole — alternating dark/light planks with caulk lines
    function makeTeakFloor() {
      var c = document.createElement('canvas'); c.width = 1024; c.height = 1024;
      var x = c.getContext('2d');
      x.fillStyle = '#5c3810'; x.fillRect(0,0,1024,1024);
      var plankH = 36;
      for (var row = 0; row < Math.ceil(1024/plankH); row++) {
        var py = row * plankH;
        var isHolly = (row % 7 === 3); // every 7th strip is white holly
        var base = isHolly ? '#e8e2d0' : 'hsl(' + (22+Math.random()*10) + ',55%,' + (24+Math.random()*12) + '%)';
        x.fillStyle = base; x.fillRect(0, py+1, 1024, plankH-2);
        if (!isHolly) {
          // Grain
          x.strokeStyle = 'rgba(0,0,0,0.07)'; x.lineWidth = 1;
          for (var gi = 0; gi < 12; gi++) {
            var gx2 = Math.random() * 1024;
            x.beginPath(); x.moveTo(gx2, py); x.lineTo(gx2+(Math.random()-.5)*18, py+plankH); x.stroke();
          }
          // Plank end joints at random intervals
          if (Math.random() > 0.65) {
            var jx = 80 + Math.random() * 864;
            x.strokeStyle = 'rgba(0,0,0,0.2)'; x.lineWidth = 1.5;
            x.beginPath(); x.moveTo(jx, py); x.lineTo(jx, py+plankH); x.stroke();
          }
        }
        // Caulk lines (black between planks)
        x.fillStyle = '#1a0e06'; x.fillRect(0, py, 1024, 1);
      }
      noise(x, 1024, 1024, 0.02);
      var t = new THREE.CanvasTexture(c);
      t.wrapS = t.wrapT = THREE.RepeatWrapping;
      t.repeat.set(2.5, 4);
      t.encoding = THREE.sRGBEncoding;
      return t;
    }

    // White lacquer hull sides with teak strip inlay
    function makeHullWall() {
      var c = document.createElement('canvas'); c.width = 1024; c.height = 512;
      var x = c.getContext('2d');
      x.fillStyle = '#f4f0ea'; x.fillRect(0,0,1024,512);
      // Teak trim strips
      [80, 110, 140, 340, 365, 390].forEach(function(ty) {
        var base = (ty < 200) ? '#7a4e20' : '#8a5c28';
        x.fillStyle = base; x.fillRect(0, ty, 1024, 20);
        // Grain
        x.strokeStyle='rgba(0,0,0,0.06)'; x.lineWidth=1;
        for (var gi=0; gi<16; gi++) {
          var gx2 = Math.random()*1024;
          x.beginPath(); x.moveTo(gx2,ty); x.lineTo(gx2+(Math.random()-.5)*12,ty+20); x.stroke();
        }
        x.fillStyle='rgba(0,0,0,0.08)'; x.fillRect(0,ty,1024,1);
        x.fillStyle='rgba(255,255,255,0.12)'; x.fillRect(0,ty+19,1024,1);
      });
      // Panel lines
      x.strokeStyle='rgba(180,170,155,0.4)'; x.lineWidth=1;
      for (var lx2=0; lx2<1024; lx2+=220) { x.beginPath(); x.moveTo(lx2,0); x.lineTo(lx2,512); x.stroke(); }
      noise(x, 1024, 512, 0.015);
      var t = new THREE.CanvasTexture(c);
      t.wrapS = t.wrapT = THREE.RepeatWrapping;
      t.repeat.set(3, 1);
      t.encoding = THREE.sRGBEncoding;
      return t;
    }

    // Cream overhead liner (smooth)
    function makeCeilingMap() {
      var c = document.createElement('canvas'); c.width = 512; c.height = 512;
      var x = c.getContext('2d');
      x.fillStyle = '#f8f5ee'; x.fillRect(0,0,512,512);
      // Subtle panel lines
      x.strokeStyle = 'rgba(160,150,135,0.25)'; x.lineWidth = 1;
      [128, 256, 384].forEach(function(l) {
        x.beginPath(); x.moveTo(l,0); x.lineTo(l,512); x.stroke();
        x.beginPath(); x.moveTo(0,l); x.lineTo(512,l); x.stroke();
      });
      noise(x, 512, 512, 0.012);
      var t = new THREE.CanvasTexture(c);
      t.wrapS = t.wrapT = THREE.RepeatWrapping;
      t.repeat.set(3, 2);
      t.encoding = THREE.sRGBEncoding;
      return t;
    }

    // Ocean porthole view
    function makeOceanView() {
      var c = document.createElement('canvas'); c.width = 256; c.height = 256;
      var x = c.getContext('2d');
      // Sky
      var sky = x.createLinearGradient(0,0,0,130);
      sky.addColorStop(0,'#1a4a88'); sky.addColorStop(0.6,'#3a80cc'); sky.addColorStop(1,'#6ab0e8');
      x.fillStyle=sky; x.fillRect(0,0,256,130);
      // Clouds
      x.fillStyle='rgba(255,255,255,0.6)';
      [[40,30,55,18],[140,22,70,16],[200,40,45,14],[80,50,40,12]].forEach(function(cl){
        x.beginPath(); x.ellipse(cl[0],cl[1],cl[2],cl[3],0,0,Math.PI*2); x.fill();
      });
      // Horizon glow
      x.fillStyle='rgba(255,240,200,0.3)'; x.fillRect(0,120,256,20);
      // Ocean
      var sea = x.createLinearGradient(0,130,0,256);
      sea.addColorStop(0,'#2a6aaa'); sea.addColorStop(0.5,'#1a4880'); sea.addColorStop(1,'#0e2850');
      x.fillStyle=sea; x.fillRect(0,130,256,126);
      // Wave highlights
      x.strokeStyle='rgba(180,220,255,0.45)'; x.lineWidth=1.5;
      for (var wy=140; wy<250; wy+=14) {
        x.beginPath();
        for (var wx=0; wx<256; wx+=30) {
          x.moveTo(wx,wy); x.quadraticCurveTo(wx+7,wy-3,wx+15,wy); x.quadraticCurveTo(wx+23,wy+3,wx+30,wy);
        }
        x.stroke();
      }
      // Sun glint
      x.fillStyle='rgba(255,240,150,0.25)'; x.fillRect(100,130,56,50);
      return new THREE.CanvasTexture(c);
    }

    // Maritime paintings
    function makeArt(style) {
      var c = document.createElement('canvas'); c.width=600; c.height=400;
      var x = c.getContext('2d');

      if (style === 0) {
        // Classic tall ship at sea
        var sky=x.createLinearGradient(0,0,0,220);
        sky.addColorStop(0,'#1a2f5a'); sky.addColorStop(0.5,'#2a5080'); sky.addColorStop(1,'#6a9ab8');
        x.fillStyle=sky; x.fillRect(0,0,600,220);
        // Clouds
        x.fillStyle='rgba(220,230,245,0.7)';
        [[80,60,90,25],[250,40,110,22],[450,55,80,20],[160,80,60,16]].forEach(function(cl){
          x.beginPath(); x.ellipse(cl[0],cl[1],cl[2],cl[3],0,0,Math.PI*2); x.fill();
        });
        // Sea
        var sea=x.createLinearGradient(0,220,0,400);
        sea.addColorStop(0,'#2a5880'); sea.addColorStop(1,'#0e2040');
        x.fillStyle=sea; x.fillRect(0,220,600,180);
        // Waves
        x.strokeStyle='rgba(150,200,240,0.4)'; x.lineWidth=2;
        for (var wy=235; wy<395; wy+=18) {
          x.beginPath();
          for (var wx=0; wx<600; wx+=45) {
            x.moveTo(wx,wy); x.quadraticCurveTo(wx+11,wy-4,wx+22,wy); x.quadraticCurveTo(wx+33,wy+4,wx+45,wy);
          }
          x.stroke();
        }
        // Hull
        x.fillStyle='#1a0e06'; x.beginPath();
        x.moveTo(230,240); x.lineTo(370,240); x.lineTo(385,268); x.lineTo(215,268); x.closePath(); x.fill();
        x.fillStyle='rgba(180,60,30,0.9)';
        x.beginPath(); x.moveTo(235,235); x.lineTo(365,235); x.lineTo(370,240); x.lineTo(230,240); x.closePath(); x.fill();
        // Masts
        x.strokeStyle='#5a3810'; x.lineWidth=4;
        x.beginPath(); x.moveTo(270,235); x.lineTo(270,60); x.stroke();
        x.beginPath(); x.moveTo(330,235); x.lineTo(325,75); x.stroke();
        x.lineWidth=2;
        x.beginPath(); x.moveTo(270,60); x.lineTo(325,75); x.stroke();
        // Sails
        x.fillStyle='rgba(245,238,220,0.92)';
        x.beginPath(); x.moveTo(270,65); x.lineTo(320,100); x.lineTo(270,190); x.closePath(); x.fill();
        x.beginPath(); x.moveTo(270,65); x.lineTo(222,105); x.lineTo(270,195); x.closePath(); x.fill();
        x.beginPath(); x.moveTo(325,78); x.lineTo(368,108); x.lineTo(325,195); x.closePath(); x.fill();
        // Rigging
        x.strokeStyle='rgba(60,35,10,0.6)'; x.lineWidth=1;
        [[270,65,215,235],[270,65,385,268],[325,78,215,235],[325,78,385,268]].forEach(function(l){
          x.beginPath(); x.moveTo(l[0],l[1]); x.lineTo(l[2],l[3]); x.stroke();
        });
        // Reflection
        x.globalAlpha=0.15; x.scale(1,-0.3);
        x.drawImage(c,0,-900); x.setTransform(1,0,0,1,0,0); x.globalAlpha=1;

      } else if (style === 1) {
        // Nautical chart / map style
        x.fillStyle='#f0e8d0'; x.fillRect(0,0,600,400);
        // Aged paper texture
        for (var ai=0; ai<3000; ai++) {
          x.fillStyle='rgba(139,110,60,'+(Math.random()*0.04)+')';
          x.fillRect(Math.random()*600,Math.random()*400,2,2);
        }
        // Border
        x.strokeStyle='#8a6820'; x.lineWidth=3;
        x.strokeRect(12,12,576,376);
        x.strokeStyle='#a07828'; x.lineWidth=1; x.strokeRect(18,18,564,364);
        // Compass rose
        var cx2=480, cy2=300, cr=55;
        x.strokeStyle='#5a3808'; x.fillStyle='#5a3808'; x.lineWidth=1.5;
        for (var di=0; di<8; di++) {
          var ang=(di/8)*Math.PI*2;
          x.beginPath(); x.moveTo(cx2,cy2);
          x.lineTo(cx2+Math.cos(ang)*cr,cy2+Math.sin(ang)*cr);
          x.stroke();
        }
        x.beginPath(); x.arc(cx2,cy2,cr*0.18,0,Math.PI*2); x.fill();
        x.fillStyle='#8a1010';
        x.beginPath(); x.moveTo(cx2,cy2-cr); x.lineTo(cx2-8,cy2); x.lineTo(cx2,cy2-cr*0.3); x.closePath(); x.fill();
        // Landmasses
        x.fillStyle='rgba(180,160,100,0.5)';
        x.beginPath(); x.moveTo(40,40); x.bezierCurveTo(120,60,160,100,140,150);
        x.bezierCurveTo(120,200,60,210,40,180); x.closePath(); x.fill();
        x.beginPath(); x.moveTo(200,40); x.bezierCurveTo(280,50,340,80,360,120);
        x.bezierCurveTo(380,160,350,200,300,210); x.bezierCurveTo(250,220,200,190,190,150);
        x.bezierCurveTo(180,110,190,70,200,40); x.closePath(); x.fill();
        // Depth soundings
        x.fillStyle='#2a5088'; x.font='bold 10px Georgia';
        [[90,280,'14f'],[160,320,'22f'],[250,300,'38f'],[340,280,'45f'],[420,240,'52f'],
         [100,360,'18f'],[280,370,'41f']].forEach(function(d){
          x.fillText(d[2],d[0],d[1]);
        });
        // Dotted shipping lanes
        x.setLineDash([4,6]); x.strokeStyle='rgba(80,80,160,0.5)'; x.lineWidth=1.5;
        x.beginPath(); x.moveTo(40,250); x.bezierCurveTo(200,230,350,260,560,220); x.stroke();
        x.beginPath(); x.moveTo(40,290); x.bezierCurveTo(180,310,340,300,560,270); x.stroke();
        x.setLineDash([]);
        // Title
        x.fillStyle='#3a2008'; x.font='italic bold 18px Georgia';
        x.fillText('Chart of the Northern Waters', 30, 390);
        x.font='11px Georgia'; x.fillText('Surveyed 1887', 30, 370);

      } else if (style === 2) {
        // Stormy sea — dramatic oil painting
        var bg=x.createLinearGradient(0,0,0,400);
        bg.addColorStop(0,'#1a1820'); bg.addColorStop(0.4,'#2a3040'); bg.addColorStop(0.7,'#1e3050'); bg.addColorStop(1,'#0a1828');
        x.fillStyle=bg; x.fillRect(0,0,600,400);
        // Lightning
        x.strokeStyle='rgba(220,240,255,0.7)'; x.lineWidth=2;
        x.beginPath(); x.moveTo(480,0); x.lineTo(465,80); x.lineTo(478,80); x.lineTo(458,160); x.stroke();
        x.globalAlpha=0.15; x.fillStyle='rgba(200,220,255,1)'; x.fillRect(420,0,80,200); x.globalAlpha=1;
        // Storm clouds
        x.fillStyle='rgba(30,30,48,0.85)';
        [[100,30,160,50],[300,20,180,55],[500,35,130,45],[200,60,140,40],[420,65,120,38]].forEach(function(cl){
          x.beginPath(); x.ellipse(cl[0],cl[1],cl[2],cl[3],0,0,Math.PI*2); x.fill();
        });
        // Rain streaks
        x.strokeStyle='rgba(140,170,200,0.2)'; x.lineWidth=0.8;
        for (var ri=0; ri<80; ri++) {
          x.beginPath();
          var rx2=Math.random()*600, ry=Math.random()*250;
          x.moveTo(rx2,ry); x.lineTo(rx2-8,ry+40); x.stroke();
        }
        // Raging sea
        var sea2=x.createLinearGradient(0,210,0,400);
        sea2.addColorStop(0,'#1e4060'); sea2.addColorStop(1,'#0a1a28');
        x.fillStyle=sea2; x.fillRect(0,210,600,190);
        // White caps
        x.fillStyle='rgba(200,220,240,0.7)';
        for (var wc2=0; wc2<25; wc2++) {
          var wcx=Math.random()*600, wcy=215+Math.random()*170;
          x.beginPath(); x.ellipse(wcx,wcy,20+Math.random()*30,4+Math.random()*6,0,0,Math.PI*2); x.fill();
        }
        // Ship silhouette in distance
        x.fillStyle='rgba(15,15,20,0.9)';
        x.beginPath(); x.moveTo(260,215); x.lineTo(340,215); x.lineTo(348,228); x.lineTo(252,228); x.closePath(); x.fill();
        x.strokeStyle='rgba(15,15,20,0.9)'; x.lineWidth=2;
        x.beginPath(); x.moveTo(285,215); x.lineTo(282,175); x.stroke();
        x.beginPath(); x.moveTo(315,215); x.lineTo(313,180); x.stroke();

      } else {
        // Sunset harbour — warm impressionist
        var bg3=x.createLinearGradient(0,0,0,400);
        bg3.addColorStop(0,'#1a1030'); bg3.addColorStop(0.3,'#8a2e08'); bg3.addColorStop(0.55,'#d86010'); bg3.addColorStop(0.75,'#f0a030'); bg3.addColorStop(1,'#e87820');
        x.fillStyle=bg3; x.fillRect(0,0,600,400);
        // Sun
        x.beginPath(); x.arc(300,195,38,0,Math.PI*2);
        var sg=x.createRadialGradient(300,195,0,300,195,38);
        sg.addColorStop(0,'rgba(255,240,150,1)'); sg.addColorStop(1,'rgba(255,180,60,0.8)');
        x.fillStyle=sg; x.fill();
        // Glow
        var glow=x.createRadialGradient(300,195,0,300,195,130);
        glow.addColorStop(0,'rgba(255,200,80,0.25)'); glow.addColorStop(1,'rgba(255,100,20,0)');
        x.fillStyle=glow; x.fillRect(170,65,260,260);
        // Water
        var sea3=x.createLinearGradient(0,260,0,400);
        sea3.addColorStop(0,'#2a4870'); sea3.addColorStop(1,'#0e1c30');
        x.fillStyle=sea3; x.fillRect(0,260,600,140);
        // Reflection
        x.fillStyle='rgba(240,160,40,0.35)'; x.fillRect(255,265,90,80);
        x.fillStyle='rgba(240,160,40,0.15)'; x.fillRect(220,345,160,55);
        // Harbour silhouette
        x.fillStyle='rgba(10,8,15,0.92)';
        // Buildings/dock
        [[0,180,80,260],[80,200,40,260],[120,190,60,260],[0,240,600,260]].forEach(function(r){
          x.fillRect(r[0],r[1],r[2],r[3]-r[1]);
        });
        x.fillRect(500,170,40,260); x.fillRect(540,185,35,260); x.fillRect(565,195,35,260);
        // Masts in harbour
        x.strokeStyle='rgba(10,8,15,0.85)'; x.lineWidth=2;
        [[160,240,160,140],[185,245,185,150],[420,240,420,145],[445,245,445,158]].forEach(function(l){
          x.beginPath(); x.moveTo(l[0],l[1]); x.lineTo(l[2],l[3]); x.stroke();
        });
        // Dabs of light impressionist style
        var cols2=['#f5c030','#e87020','#f08040'];
        for (var di2=0; di2<60; di2++) {
          x.fillStyle=cols2[Math.floor(Math.random()*3)];
          x.globalAlpha=0.5+Math.random()*0.4;
          x.beginPath(); x.arc(Math.random()*600,265+Math.random()*135,1.5+Math.random()*4,0,Math.PI*2); x.fill();
        }
        x.globalAlpha=1;
      }
      var t = new THREE.CanvasTexture(c);
      t.encoding = THREE.sRGBEncoding;
      return t;
    }

    // ── Build yacht saloon ────────────────────────────────────────────────

    // Floor — teak & holly
    var floor = new THREE.Mesh(
      new THREE.PlaneGeometry(W, D),
      new THREE.MeshStandardMaterial({ map: makeTeakFloor(), roughness: 0.78, metalness: 0 })
    );
    floor.rotation.x = -Math.PI/2; floor.position.y = -hh;
    floor.receiveShadow = true; scene.add(floor);

    // Ceiling — cream liner
    var ceil = new THREE.Mesh(
      new THREE.PlaneGeometry(W, D),
      new THREE.MeshStandardMaterial({ map: makeCeilingMap(), roughness: 0.88, metalness: 0 })
    );
    ceil.rotation.x = Math.PI/2; ceil.position.y = hh;
    ceil.receiveShadow = true; scene.add(ceil);

    // Hull walls — white lacquer with teak trim
    var hullMat = new THREE.MeshStandardMaterial({ map: makeHullWall(), roughness: 0.35, metalness: 0.05 });
    function addWall(ww, wh, pos, rotY, mat) {
      var m = new THREE.Mesh(new THREE.PlaneGeometry(ww, wh), mat || hullMat);
      m.position.set(pos[0],pos[1],pos[2]); m.rotation.y = rotY;
      m.receiveShadow = true; scene.add(m);
    }
    addWall(W, H, [0,0,-hd],  0);
    addWall(W, H, [0,0, hd],  Math.PI);
    addWall(D, H, [-hw,0,0],  Math.PI/2);
    addWall(D, H, [ hw,0,0], -Math.PI/2);

    // Teak handrail / grab rail along sides
    var brassMat = new THREE.MeshStandardMaterial({ color: 0xb8920a, roughness: 0.18, metalness: 0.9 });
    var teakRailMat = new THREE.MeshStandardMaterial({ color: 0x6a3c0e, roughness: 0.55, metalness: 0 });
    [-hw+0.06, hw-0.06].forEach(function(rx) {
      var rail = new THREE.Mesh(new THREE.CylinderGeometry(0.018,0.018,D-0.4,8), teakRailMat);
      rail.rotation.x = Math.PI/2; rail.position.set(rx, hh-0.35, 0); scene.add(rail);
      // Stanchions
      for (var si=-3; si<=3; si++) {
        var stan = new THREE.Mesh(new THREE.CylinderGeometry(0.012,0.012,0.22,6), brassMat);
        stan.position.set(rx, hh-0.46, si*1.0); scene.add(stan);
      }
    });

    // ── Portholes ─────────────────────────────────────────────────────────
    var portholeMat = new THREE.MeshStandardMaterial({ color: 0xb8920a, roughness: 0.15, metalness: 0.9 });
    var glassMat  = new THREE.MeshStandardMaterial({ color: 0x88c0e8, transparent: true, opacity: 0.3, roughness: 0.05 });
    var oceanMat  = new THREE.MeshStandardMaterial({ map: makeOceanView(), roughness: 0.1 });

    [-1.5, 0.8].forEach(function(pz, pi) {
      var pg = new THREE.Group();
      pg.position.set(-hw+0.01, 0.25, pz);
      pg.rotation.y = Math.PI/2;
      // Ocean view backing
      var ocean = new THREE.Mesh(new THREE.CircleGeometry(0.26, 32), oceanMat);
      ocean.position.z = -0.01; pg.add(ocean);
      // Glass
      var glass = new THREE.Mesh(new THREE.CircleGeometry(0.24, 32), glassMat);
      glass.position.z = 0.02; pg.add(glass);
      // Brass ring outer
      var ring = new THREE.Mesh(
        new THREE.RingGeometry(0.24, 0.32, 32),
        portholeMat
      );
      ring.position.z = 0.03; pg.add(ring);
      // Bolts
      for (var bi=0; bi<8; bi++) {
        var ba = (bi/8)*Math.PI*2;
        var bolt = new THREE.Mesh(new THREE.CylinderGeometry(0.018,0.018,0.025,6), portholeMat);
        bolt.position.set(Math.cos(ba)*0.295, Math.sin(ba)*0.295, 0.03);
        bolt.rotation.x = Math.PI/2; pg.add(bolt);
      }
      // Hinge
      var hinge = new THREE.Mesh(new THREE.BoxGeometry(0.04,0.1,0.04), portholeMat);
      hinge.position.set(0, 0.3, 0.03); pg.add(hinge);
      scene.add(pg);
    });

    // Right side porthole
    var rpg = new THREE.Group();
    rpg.position.set(hw-0.01, 0.25, -0.5);
    rpg.rotation.y = -Math.PI/2;
    var rocean = new THREE.Mesh(new THREE.CircleGeometry(0.26, 32), oceanMat);
    rocean.position.z = -0.01; rpg.add(rocean);
    var rglass = new THREE.Mesh(new THREE.CircleGeometry(0.24, 32), glassMat);
    rglass.position.z = 0.02; rpg.add(rglass);
    var rring = new THREE.Mesh(new THREE.RingGeometry(0.24, 0.32, 32), portholeMat);
    rring.position.z = 0.03; rpg.add(rring);
    for (var bi2=0; bi2<8; bi2++) {
      var ba2=(bi2/8)*Math.PI*2;
      var bolt2 = new THREE.Mesh(new THREE.CylinderGeometry(0.018,0.018,0.025,6), portholeMat);
      bolt2.position.set(Math.cos(ba2)*0.295,Math.sin(ba2)*0.295,0.03); bolt2.rotation.x=Math.PI/2; rpg.add(bolt2);
    }
    scene.add(rpg);

    // Teak trim strips (floor level & ceiling)
    var teakMat2 = new THREE.MeshStandardMaterial({ color: 0x6a3c0e, roughness: 0.55 });
    var BD = 0.05, BH = 0.12;
    [[W,BH,BD,[0,-hh+BH/2,-hd+BD/2],0],
     [W,BH,BD,[0,-hh+BH/2, hd-BD/2],Math.PI],
     [D,BH,BD,[-hw+BD/2,-hh+BH/2,0],Math.PI/2],
     [D,BH,BD,[ hw-BD/2,-hh+BH/2,0],-Math.PI/2],
    ].forEach(function(b) {
      var m = new THREE.Mesh(new THREE.BoxGeometry(b[0],b[1],b[2]), teakMat2);
      m.position.set(b[3][0],b[3][1],b[3][2]); m.rotation.y=b[4]; scene.add(m);
    });

    // ── Banquette settee (U-shape) ────────────────────────────────────────
    var navyMat  = new THREE.MeshStandardMaterial({ color: 0x1a2a4a, roughness: 0.92 });
    var teakFurn = new THREE.MeshStandardMaterial({ color: 0x6a3c0e, roughness: 0.6 });

    // Back banquette along stern (back wall)
    var seatGroup = new THREE.Group();
    seatGroup.position.set(0, -hh, -hd + 0.5);
    // Base
    var sBase = new THREE.Mesh(new THREE.BoxGeometry(W-0.3,0.42,0.7), teakFurn);
    sBase.position.y = 0.21; sBase.castShadow = true; seatGroup.add(sBase);
    // Seat cushion
    var sCush = new THREE.Mesh(new THREE.BoxGeometry(W-0.38,0.1,0.64), navyMat);
    sCush.position.set(0,0.47,0); seatGroup.add(sCush);
    // Back cushion
    var sBack = new THREE.Mesh(new THREE.BoxGeometry(W-0.38,0.55,0.1), navyMat);
    sBack.position.set(0,0.62,-0.31); seatGroup.add(sBack);
    scene.add(seatGroup);

    // Side settee — port side
    var ssGroup = new THREE.Group();
    ssGroup.position.set(-hw+0.5, -hh, 0.4);
    var ssBase = new THREE.Mesh(new THREE.BoxGeometry(0.65,0.42,3.2), teakFurn);
    ssBase.position.set(0,0.21,0); ssBase.castShadow=true; ssGroup.add(ssBase);
    var ssCush = new THREE.Mesh(new THREE.BoxGeometry(0.59,0.1,3.12), navyMat);
    ssCush.position.set(0,0.47,0); ssGroup.add(ssCush);
    var ssBack = new THREE.Mesh(new THREE.BoxGeometry(0.1,0.5,3.12), navyMat);
    ssBack.position.set(-0.29,0.63,0); ssGroup.add(ssBack);
    scene.add(ssGroup);

    // ── Saloon table — teak with brass edge ───────────────────────────────
    var tableGroup = new THREE.Group();
    tableGroup.position.set(-0.2, -hh, -0.2);
    var tTop = new THREE.Mesh(new THREE.BoxGeometry(1.1,0.05,0.65), teakFurn);
    tTop.position.y=0.44; tTop.castShadow=true; tableGroup.add(tTop);
    // Brass edge strip
    var edge = new THREE.Mesh(new THREE.BoxGeometry(1.12,0.02,0.67), brassMat);
    edge.position.y=0.465; tableGroup.add(edge);
    // Pedestal base
    var tPed = new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.08,0.38,8), teakFurn);
    tPed.position.y=0.19; tableGroup.add(tPed);
    var tFoot = new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.22,0.04,12), teakFurn);
    tFoot.position.y=0.02; tableGroup.add(tFoot);
    scene.add(tableGroup);

    // Items on table
    var chartGroup = new THREE.Group();
    chartGroup.position.set(-0.2, -hh+0.47, -0.2);
    var chart = new THREE.Mesh(new THREE.PlaneGeometry(0.55,0.38), new THREE.MeshStandardMaterial({ color: 0xf0e8c8, roughness: 0.9 }));
    chart.rotation.x=-Math.PI/2; chartGroup.add(chart);
    scene.add(chartGroup);
    // Coffee mug
    var mugG = new THREE.Group(); mugG.position.set(0.2,-hh+0.475,0);
    var mug = new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.035,0.1,10), new THREE.MeshStandardMaterial({ color: 0xf4f0ea, roughness: 0.7 }));
    mug.position.y=0.05; mugG.add(mug);
    scene.add(mugG);

    // ── Chart table / nav station (starboard aft) ─────────────────────────
    var navGroup = new THREE.Group();
    navGroup.position.set(hw-0.4, -hh, -hd+1.0);
    var navDesk = new THREE.Mesh(new THREE.BoxGeometry(0.65,0.04,1.1), teakFurn);
    navDesk.position.set(0,0.75,0); navDesk.castShadow=true; navGroup.add(navDesk);
    var navBase = new THREE.Mesh(new THREE.BoxGeometry(0.65,0.75,0.06), teakFurn);
    navBase.position.set(0,0.375,-0.52); navGroup.add(navBase);
    var navSide = new THREE.Mesh(new THREE.BoxGeometry(0.04,0.75,1.0), teakFurn);
    navSide.position.set(-0.305,0.375,0); navGroup.add(navSide);
    // Instruments panel
    var instPanel = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.35,0.02), new THREE.MeshStandardMaterial({ color: 0x111820, roughness: 0.6, metalness: 0.3 }));
    instPanel.position.set(0,0.6,-0.49); navGroup.add(instPanel);
    // Instrument dials
    [[-0.18,0.62],[0,0.62],[0.18,0.62],[-0.09,0.42],[0.09,0.42]].forEach(function(d) {
      var dial = new THREE.Mesh(new THREE.CircleGeometry(0.055,16), new THREE.MeshStandardMaterial({ color: 0x0a1a30, roughness: 0.3 }));
      dial.position.set(d[0],d[1],-0.48); navGroup.add(dial);
      var dring = new THREE.Mesh(new THREE.RingGeometry(0.055,0.065,16), brassMat);
      dring.position.set(d[0],d[1],-0.478); navGroup.add(dring);
    });
    scene.add(navGroup);

    // Nav station stool
    var stool = new THREE.Mesh(new THREE.CylinderGeometry(0.14,0.1,0.05,10), navyMat);
    stool.position.set(hw-0.4,-hh+0.48,-hd+1.9); scene.add(stool);
    var stoolPed = new THREE.Mesh(new THREE.CylinderGeometry(0.025,0.03,0.44,8), brassMat);
    stoolPed.position.set(hw-0.4,-hh+0.22,-hd+1.9); scene.add(stoolPed);

    // ── Paintings (maritime) ──────────────────────────────────────────────
    function addPainting(pos, rotY, style) {
      var PW=1.9, PH=1.35, FT=0.055, FD=0.07;
      var g = new THREE.Group();
      g.position.set(pos[0],pos[1],pos[2]); g.rotation.y=rotY;

      var art = new THREE.Mesh(
        new THREE.PlaneGeometry(PW,PH),
        new THREE.MeshStandardMaterial({ map:makeArt(style), roughness:0.88 })
      );
      art.position.z=0.02; g.add(art);

      // Frame — dark mahogany with brass liner
      var fmM = new THREE.MeshStandardMaterial({ color:0x2a1008, roughness:0.65, metalness:0.05 });
      [[PW+FT*2,FT,FD,0, PH/2+FT/2,0],
       [PW+FT*2,FT,FD,0,-PH/2-FT/2,0],
       [FT,PH,FD,-PW/2-FT/2,0,0],
       [FT,PH,FD, PW/2+FT/2,0,0],
      ].forEach(function(f) {
        var m=new THREE.Mesh(new THREE.BoxGeometry(f[0],f[1],f[2]),fmM);
        m.position.set(f[3],f[4],f[5]); g.add(m);
      });
      // Brass liner
      var liner=0.035;
      [[PW+liner*2,liner,FD*.5,0, PH/2-liner/2,0.01],
       [PW+liner*2,liner,FD*.5,0,-PH/2+liner/2,0.01],
       [liner,PH,FD*.5,-PW/2+liner/2,0,0.01],
       [liner,PH,FD*.5, PW/2-liner/2,0,0.01],
      ].forEach(function(f) {
        var m=new THREE.Mesh(new THREE.BoxGeometry(f[0],f[1],f[2]),brassMat);
        m.position.set(f[3],f[4],f[5]); g.add(m);
      });

      // Picture light
      var lb=new THREE.Mesh(new THREE.BoxGeometry(0.7,0.05,0.09),brassMat);
      lb.position.set(0,PH/2+FT+0.1,0.04); g.add(lb);
      var spot=new THREE.SpotLight(0xfff0a0,2.5,4,Math.PI/7,0.4,1.5);
      spot.position.set(0,PH/2+FT+0.18,0.25);
      spot.target.position.set(0,-PH*.15,0.8);
      spot.castShadow=true; g.add(spot); g.add(spot.target);

      scene.add(g);
    }

    addPainting([0, 0.35, -hd+0.04],  0,           0);  // stern — tall ship
    addPainting([0, 0.35,  hd-0.04],  Math.PI,     3);  // bow — harbour sunset
    addPainting([-hw+0.04, 0.35, 1.5], Math.PI/2,  2);  // port — stormy sea
    addPainting([ hw-0.04, 0.4, -2.8],-Math.PI/2,  1);  // starboard — nautical chart

    // ── Resize ────────────────────────────────────────────────────────────
    window.addEventListener('resize', function() {
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // ── Loop ──────────────────────────────────────────────────────────────
    var clk = new THREE.Clock();
    (function animate() {
      requestAnimationFrame(animate);
      var t = clk.getElapsedTime();
      // Gentle ocean light shimmer through portholes
      sun1.intensity = 3.0 + Math.sin(t*0.8)*0.3 + Math.sin(t*1.7)*0.15;
      sun2.intensity = 1.5 + Math.sin(t*0.9+1)*0.2;
      // Subtle boat rock (very gentle camera sway)
      camera.position.y += Math.sin(t*0.4)*0.0003;
      controls.update();
      renderer.render(scene, camera);
    })();

  })();
  </script>
</body>
</html>
