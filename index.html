<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Room</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.45);
      font-family: 'Georgia', serif;
      font-size: 13px;
      letter-spacing: 0.05em;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hint">Click + drag to look around &nbsp;·&nbsp; Scroll to zoom</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ── Scene ──────────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);
    scene.fog = new THREE.Fog(0x111111, 10, 25);

    const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.05, 60);
    camera.position.set(0, 0.2, 0.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.9;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enablePan = false;
    controls.minDistance = 0.1;
    controls.maxDistance = 5;
    controls.target.set(0, 0.2, 0);
    controls.update();

    // ── Room dimensions ────────────────────────────────────────────────────
    const RW = 10, RH = 4, RD = 10;
    const HALF_W = RW / 2, HALF_H = RH / 2, HALF_D = RD / 2;

    // ── Lighting ───────────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xfff3e0, 0.35));

    // Central pendant
    const pendant = new THREE.PointLight(0xfff5e0, 2.5, 18);
    pendant.position.set(0, HALF_H - 0.35, 0);
    pendant.castShadow = true;
    pendant.shadow.mapSize.set(1024, 1024);
    scene.add(pendant);

    // Warm corner fills
    [[−3, −1, −3], [3, −1, 3], [−3, −1, 3], [3, −1, −3]].forEach(([x, y, z]) => {
      const l = new THREE.PointLight(0xffe4c0, 0.3, 8);
      l.position.set(x, y, z);
      scene.add(l);
    });

    // Pendant bulb geometry
    const bulbMesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.12, 16, 8),
      new THREE.MeshBasicMaterial({ color: 0xfff9e0 })
    );
    bulbMesh.position.copy(pendant.position);
    scene.add(bulbMesh);

    // Cord
    const cordGeo = new THREE.CylinderGeometry(0.01, 0.01, 0.6);
    const cordMesh = new THREE.Mesh(cordGeo, new THREE.MeshLambertMaterial({ color: 0x222222 }));
    cordMesh.position.set(0, HALF_H - 0.05, 0);
    scene.add(cordMesh);

    // ── Texture helpers ────────────────────────────────────────────────────

    function makeWallTexture(hexColor) {
      const c = document.createElement('canvas');
      c.width = c.height = 512;
      const ctx = c.getContext('2d');
      ctx.fillStyle = hexColor;
      ctx.fillRect(0, 0, 512, 512);
      // subtle noise
      for (let i = 0; i < 6000; i++) {
        const a = Math.random() * 0.04;
        ctx.fillStyle = Math.random() > 0.5 ? `rgba(255,255,255,${a})` : `rgba(0,0,0,${a})`;
        ctx.fillRect(Math.random() * 512, Math.random() * 512, 2, 2);
      }
      const t = new THREE.CanvasTexture(c);
      t.wrapS = t.wrapT = THREE.RepeatWrapping;
      t.repeat.set(3, 1.5);
      return t;
    }

    function makeFloorTexture() {
      const c = document.createElement('canvas');
      c.width = c.height = 512;
      const ctx = c.getContext('2d');
      const PLANK_W = 512 / 4;
      for (let col = 0; col < 4; col++) {
        for (let row = 0; row < 6; row++) {
          const x = col * PLANK_W;
          const y = row * 86;
          const hue = 28 + Math.random() * 10;
          const lit = 30 + Math.random() * 12;
          const g = ctx.createLinearGradient(x, y, x + PLANK_W, y + 86);
          g.addColorStop(0, `hsl(${hue},48%,${lit}%)`);
          g.addColorStop(0.4, `hsl(${hue+3},42%,${lit+6}%)`);
          g.addColorStop(1, `hsl(${hue},46%,${lit+2}%)`);
          ctx.fillStyle = g;
          ctx.fillRect(x + 1, y + 1, PLANK_W - 2, 84);
          ctx.strokeStyle = 'rgba(0,0,0,0.25)';
          ctx.lineWidth = 2;
          ctx.strokeRect(x + 1, y + 1, PLANK_W - 2, 84);
          // grain lines
          ctx.strokeStyle = `rgba(0,0,0,0.06)`;
          ctx.lineWidth = 1;
          for (let g2 = 0; g2 < 5; g2++) {
            const gx = x + Math.random() * PLANK_W;
            ctx.beginPath();
            ctx.moveTo(gx, y);
            ctx.lineTo(gx + (Math.random() - 0.5) * 20, y + 86);
            ctx.stroke();
          }
        }
      }
      const t = new THREE.CanvasTexture(c);
      t.wrapS = t.wrapT = THREE.RepeatWrapping;
      t.repeat.set(3, 3);
      return t;
    }

    function makePopcornTexture() {
      const c = document.createElement('canvas');
      c.width = c.height = 1024;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#f2ede7';
      ctx.fillRect(0, 0, 1024, 1024);
      for (let i = 0; i < 4500; i++) {
        const x = Math.random() * 1024;
        const y = Math.random() * 1024;
        const rx = 3 + Math.random() * 7;
        const ry = 2 + Math.random() * 5;
        const angle = Math.random() * Math.PI;
        const bright = 220 + Math.floor(Math.random() * 35);
        const shadow = 140 + Math.floor(Math.random() * 50);
        const g = ctx.createRadialGradient(x - rx * 0.3, y - ry * 0.4, 0, x, y, Math.max(rx, ry));
        g.addColorStop(0, `rgb(${bright},${bright},${bright - 5})`);
        g.addColorStop(0.5, `rgb(${shadow + 30},${shadow + 25},${shadow + 20})`);
        g.addColorStop(1, `rgb(${shadow - 15},${shadow - 20},${shadow - 22})`);
        ctx.beginPath();
        ctx.ellipse(x, y, rx, ry, angle, 0, Math.PI * 2);
        ctx.fillStyle = g;
        ctx.fill();
      }
      const t = new THREE.CanvasTexture(c);
      t.wrapS = t.wrapT = THREE.RepeatWrapping;
      t.repeat.set(5, 5);
      return t;
    }

    // ── Painting art ───────────────────────────────────────────────────────

    function makePaintingCanvas(style) {
      const c = document.createElement('canvas');
      c.width = 512; c.height = 384;
      const ctx = c.getContext('2d');

      if (style === 0) {
        // Sunset over water
        const sky = ctx.createLinearGradient(0, 0, 0, 220);
        sky.addColorStop(0, '#1a2f5a');
        sky.addColorStop(0.5, '#c45a20');
        sky.addColorStop(1, '#e8a030');
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, 512, 220);
        // Water
        const water = ctx.createLinearGradient(0, 220, 0, 384);
        water.addColorStop(0, '#1a3060');
        water.addColorStop(1, '#0a1830');
        ctx.fillStyle = water;
        ctx.fillRect(0, 220, 512, 164);
        // Sun
        ctx.beginPath();
        ctx.arc(256, 215, 38, 0, Math.PI * 2);
        ctx.fillStyle = '#f5c842';
        ctx.fill();
        // Sun reflection
        ctx.fillStyle = 'rgba(245,200,66,0.35)';
        ctx.fillRect(226, 220, 60, 80);
        ctx.fillStyle = 'rgba(245,200,66,0.15)';
        ctx.fillRect(206, 300, 100, 40);
        // Horizon glow
        ctx.fillStyle = 'rgba(255,120,30,0.2)';
        ctx.fillRect(0, 205, 512, 30);
        // Waves
        ctx.strokeStyle = 'rgba(100,160,220,0.4)';
        ctx.lineWidth = 1.5;
        for (let wy = 240; wy < 380; wy += 12) {
          ctx.beginPath();
          for (let wx = 0; wx < 512; wx += 40) {
            ctx.moveTo(wx, wy);
            ctx.quadraticCurveTo(wx + 10, wy - 3, wx + 20, wy);
            ctx.quadraticCurveTo(wx + 30, wy + 3, wx + 40, wy);
          }
          ctx.stroke();
        }
        // Silhouette mountains
        ctx.fillStyle = '#0d1e38';
        ctx.beginPath();
        ctx.moveTo(0, 220);
        ctx.lineTo(60, 160); ctx.lineTo(130, 200);
        ctx.lineTo(200, 140); ctx.lineTo(280, 195);
        ctx.lineTo(360, 150); ctx.lineTo(440, 185);
        ctx.lineTo(512, 165); ctx.lineTo(512, 220);
        ctx.closePath();
        ctx.fill();

      } else if (style === 1) {
        // Abstract geometric — Mondrian-ish
        const blocks = [
          { x: 0,   y: 0,   w: 200, h: 150, c: '#c8102e' },
          { x: 210, y: 0,   w: 150, h: 100, c: '#ffd700' },
          { x: 370, y: 0,   w: 142, h: 200, c: '#1a3a7c' },
          { x: 0,   y: 160, w: 100, h: 224, c: '#1a3a7c' },
          { x: 110, y: 110, w: 250, h: 140, c: '#f0ede5' },
          { x: 110, y: 260, w: 120, h: 124, c: '#c8102e' },
          { x: 240, y: 260, w: 120, h: 124, c: '#ffd700' },
          { x: 370, y: 210, w: 142, h: 174, c: '#f0ede5' },
        ];
        ctx.fillStyle = '#f0ede5';
        ctx.fillRect(0, 0, 512, 384);
        blocks.forEach(b => {
          ctx.fillStyle = b.c;
          ctx.fillRect(b.x, b.y, b.w, b.h);
        });
        ctx.strokeStyle = '#111';
        ctx.lineWidth = 6;
        [0, 200, 210, 370, 512].forEach(x => { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 384); ctx.stroke(); });
        [0, 100, 150, 200, 260, 384].forEach(y => { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(512, y); ctx.stroke(); });

      } else if (style === 2) {
        // Impressionist garden
        const bg = ctx.createLinearGradient(0, 0, 0, 384);
        bg.addColorStop(0, '#87b8d4');
        bg.addColorStop(0.5, '#a8cce0');
        bg.addColorStop(1, '#3a7a30');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, 512, 384);
        // Ground
        ctx.fillStyle = '#3a7a30';
        ctx.fillRect(0, 240, 512, 144);
        // Flowers — impressionist dabs
        const cols = ['#e83060', '#f0c030', '#e05080', '#80c040', '#c040e0', '#f08030', '#40b8e0'];
        for (let i = 0; i < 300; i++) {
          const fx = Math.random() * 512;
          const fy = 220 + Math.random() * 160;
          const r = 3 + Math.random() * 8;
          ctx.beginPath();
          ctx.arc(fx, fy, r, 0, Math.PI * 2);
          ctx.fillStyle = cols[Math.floor(Math.random() * cols.length)];
          ctx.globalAlpha = 0.7 + Math.random() * 0.3;
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        // Trees
        for (let t = 0; t < 4; t++) {
          const tx = 60 + t * 130 + (Math.random() - 0.5) * 30;
          ctx.fillStyle = '#4a3020';
          ctx.fillRect(tx - 6, 140, 12, 110);
          // Foliage dabs
          for (let d = 0; d < 80; d++) {
            const dx = tx + (Math.random() - 0.5) * 60;
            const dy = 80 + Math.random() * 80;
            ctx.beginPath();
            ctx.arc(dx, dy, 5 + Math.random() * 14, 0, Math.PI * 2);
            const green = `hsl(${105 + Math.random() * 30}, ${50 + Math.random() * 30}%, ${25 + Math.random() * 20}%)`;
            ctx.fillStyle = green;
            ctx.globalAlpha = 0.6 + Math.random() * 0.4;
            ctx.fill();
          }
          ctx.globalAlpha = 1;
        }
        // Path
        ctx.fillStyle = 'rgba(200,180,130,0.5)';
        ctx.beginPath();
        ctx.moveTo(220, 384); ctx.lineTo(270, 384); ctx.lineTo(290, 240); ctx.lineTo(240, 240);
        ctx.closePath();
        ctx.fill();

      } else {
        // Still life — vase with flowers
        ctx.fillStyle = '#2a1e0e';
        ctx.fillRect(0, 0, 512, 384);
        // Background gradient
        const bg = ctx.createRadialGradient(256, 180, 10, 256, 180, 280);
        bg.addColorStop(0, '#4a3820');
        bg.addColorStop(1, '#1a1008');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, 512, 384);
        // Table surface
        const table = ctx.createLinearGradient(0, 290, 0, 384);
        table.addColorStop(0, '#5a3c18');
        table.addColorStop(1, '#3a2010');
        ctx.fillStyle = table;
        ctx.fillRect(0, 295, 512, 89);
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(0, 293, 512, 6);
        // Vase
        ctx.fillStyle = '#2244aa';
        ctx.beginPath();
        ctx.ellipse(256, 310, 38, 16, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillRect(218, 220, 76, 95);
        ctx.beginPath();
        ctx.ellipse(256, 220, 38, 16, 0, 0, Math.PI * 2);
        ctx.fill();
        // Vase highlight
        ctx.fillStyle = 'rgba(100,150,255,0.3)';
        ctx.beginPath();
        ctx.ellipse(240, 255, 10, 45, -0.3, 0, Math.PI * 2);
        ctx.fill();
        // Stems
        const stemCols = ['#2a6020', '#1e5018', '#366828'];
        for (let s = 0; s < 8; s++) {
          const sx = 200 + s * 16 + (Math.random() - 0.5) * 12;
          ctx.strokeStyle = stemCols[s % 3];
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(256, 218);
          ctx.bezierCurveTo(256 + (Math.random()-0.5)*30, 160, sx + (Math.random()-0.5)*20, 100, sx, 50 + Math.random() * 60);
          ctx.stroke();
        }
        // Flowers
        const fData = [
          [185, 80, '#e83060'], [210, 55, '#f5c030'], [240, 40, '#e040a0'],
          [265, 48, '#ff6030'], [295, 62, '#c050e0'], [318, 75, '#f5c030'],
          [230, 95, '#e83060'], [270, 90, '#40b8e0'],
        ];
        fData.forEach(([fx, fy, col]) => {
          for (let p = 0; p < 7; p++) {
            const angle = (p / 7) * Math.PI * 2;
            const pr = 12 + Math.random() * 4;
            ctx.beginPath();
            ctx.ellipse(fx + Math.cos(angle) * pr, fy + Math.sin(angle) * pr, 9, 6, angle, 0, Math.PI * 2);
            ctx.fillStyle = col;
            ctx.globalAlpha = 0.85;
            ctx.fill();
          }
          ctx.globalAlpha = 1;
          ctx.beginPath();
          ctx.arc(fx, fy, 7, 0, Math.PI * 2);
          ctx.fillStyle = '#f5e050';
          ctx.fill();
        });
        // Leaves
        ctx.fillStyle = '#2a7030';
        ctx.globalAlpha = 0.7;
        [[195, 130], [280, 115], [220, 150]].forEach(([lx, ly]) => {
          ctx.beginPath();
          ctx.ellipse(lx, ly, 20, 8, Math.random() * Math.PI, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.globalAlpha = 1;
      }

      return new THREE.CanvasTexture(c);
    }

    // ── Build room ─────────────────────────────────────────────────────────

    const wallColor = '#ddd5c2';

    // Floor
    const floorMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(RW, RD, 1, 1),
      new THREE.MeshLambertMaterial({ map: makeFloorTexture() })
    );
    floorMesh.rotation.x = -Math.PI / 2;
    floorMesh.position.y = -HALF_H;
    floorMesh.receiveShadow = true;
    scene.add(floorMesh);

    // Ceiling
    const ceilMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(RW, RD),
      new THREE.MeshLambertMaterial({ map: makePopcornTexture() })
    );
    ceilMesh.rotation.x = Math.PI / 2;
    ceilMesh.position.y = HALF_H;
    scene.add(ceilMesh);

    // Walls — built individually so normals face inward
    function addWall(w, h, pos, rotY, texColor) {
      const m = new THREE.Mesh(
        new THREE.PlaneGeometry(w, h),
        new THREE.MeshLambertMaterial({ map: makeWallTexture(texColor) })
      );
      m.position.set(...pos);
      m.rotation.y = rotY;
      m.receiveShadow = true;
      scene.add(m);
    }
    addWall(RW, RH, [0, 0, -HALF_D], 0,           wallColor);        // back
    addWall(RW, RH, [0, 0,  HALF_D], Math.PI,     wallColor);        // front
    addWall(RD, RH, [-HALF_W, 0, 0],  Math.PI/2,  '#d4cbb8');        // left
    addWall(RD, RH, [ HALF_W, 0, 0], -Math.PI/2,  '#d4cbb8');        // right

    // Baseboard
    const baseMat = new THREE.MeshLambertMaterial({ color: 0xf5f0e8 });
    [
      { size: [RW, 0.14, 0.04], pos: [0, -HALF_H + 0.07, -HALF_D + 0.02] },
      { size: [RW, 0.14, 0.04], pos: [0, -HALF_H + 0.07,  HALF_D - 0.02], rotY: Math.PI },
      { size: [RD, 0.14, 0.04], pos: [-HALF_W + 0.02, -HALF_H + 0.07, 0], rotY:  Math.PI/2 },
      { size: [RD, 0.14, 0.04], pos: [ HALF_W - 0.02, -HALF_H + 0.07, 0], rotY: -Math.PI/2 },
    ].forEach(({ size, pos, rotY = 0 }) => {
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(...size), baseMat);
      mesh.position.set(...pos);
      mesh.rotation.y = rotY;
      scene.add(mesh);
    });

    // Crown molding
    const crownMat = new THREE.MeshLambertMaterial({ color: 0xf8f4ee });
    [
      { size: [RW, 0.10, 0.04], pos: [0,  HALF_H - 0.05, -HALF_D + 0.02] },
      { size: [RW, 0.10, 0.04], pos: [0,  HALF_H - 0.05,  HALF_D - 0.02], rotY: Math.PI },
      { size: [RD, 0.10, 0.04], pos: [-HALF_W + 0.02, HALF_H - 0.05, 0], rotY:  Math.PI/2 },
      { size: [RD, 0.10, 0.04], pos: [ HALF_W - 0.02, HALF_H - 0.05, 0], rotY: -Math.PI/2 },
    ].forEach(({ size, pos, rotY = 0 }) => {
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(...size), crownMat);
      mesh.position.set(...pos);
      mesh.rotation.y = rotY;
      scene.add(mesh);
    });

    // ── Paintings ──────────────────────────────────────────────────────────

    function addPainting(pos, rotY, artStyle) {
      const PW = 2.6, PH = 1.95;
      const FT = 0.07;  // frame thickness
      const FD = 0.07;  // frame depth
      const group = new THREE.Group();
      group.position.set(...pos);
      group.rotation.y = rotY;

      // Canvas art
      const artMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(PW, PH),
        new THREE.MeshLambertMaterial({ map: makePaintingCanvas(artStyle) })
      );
      artMesh.position.z = 0.02;
      group.add(artMesh);

      // Frame pieces (dark walnut)
      const frameMat = new THREE.MeshLambertMaterial({ color: 0x2e1a0a });
      [
        new THREE.BoxGeometry(PW + FT * 2, FT, FD),  // top
        new THREE.BoxGeometry(PW + FT * 2, FT, FD),  // bottom
        new THREE.BoxGeometry(FT, PH, FD),            // left
        new THREE.BoxGeometry(FT, PH, FD),            // right
      ].forEach((geo, i) => {
        const m = new THREE.Mesh(geo, frameMat);
        if (i === 0) m.position.set(0,  PH / 2 + FT / 2, 0);
        if (i === 1) m.position.set(0, -PH / 2 - FT / 2, 0);
        if (i === 2) m.position.set(-PW / 2 - FT / 2, 0, 0);
        if (i === 3) m.position.set( PW / 2 + FT / 2, 0, 0);
        group.add(m);
      });

      // Gold picture rail light
      const lightBarMesh = new THREE.Mesh(
        new THREE.BoxGeometry(0.9, 0.07, 0.12),
        new THREE.MeshLambertMaterial({ color: 0xb89a10 })
      );
      lightBarMesh.position.set(0, PH / 2 + FT + 0.13, 0.06);
      group.add(lightBarMesh);

      // Spotlight on painting
      const spot = new THREE.SpotLight(0xfff2c0, 2.2, 5, Math.PI / 7, 0.4, 1.5);
      spot.position.set(0, PH / 2 + FT + 0.2, 0.25);
      spot.target.position.set(0, -PH * 0.1, 0.8);
      group.add(spot);
      group.add(spot.target);

      scene.add(group);
    }

    // One on each wall, centred, eye-level-ish
    const EYE = 0.35;  // vertical offset from centre
    addPainting([0, EYE, -HALF_D + 0.04], 0,           0);  // back
    addPainting([0, EYE,  HALF_D - 0.04], Math.PI,     1);  // front
    addPainting([-HALF_W + 0.04, EYE, 0],  Math.PI/2,  2);  // left
    addPainting([ HALF_W - 0.04, EYE, 0], -Math.PI/2,  3);  // right

    // ── Resize ─────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // ── Render loop ────────────────────────────────────────────────────────
    (function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    })();
  </script>
</body>
</html>
