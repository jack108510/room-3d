<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Room</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-family: Georgia, serif;
      font-size: 13px;
      letter-spacing: 0.05em;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hint">Click + drag to look around &nbsp;·&nbsp; Scroll to zoom</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <script>
    var scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    var camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.05, 60);
    camera.position.set(0, 0.2, 0.5);

    var renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    var controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enablePan = false;
    controls.minDistance = 0.1;
    controls.maxDistance = 5;
    controls.target.set(0, 0.2, 0);
    controls.update();

    var RW = 10, RH = 4, RD = 10;
    var HW = 5, HH = 2, HD = 5;

    // Lighting
    scene.add(new THREE.AmbientLight(0xfff3e0, 0.5));

    var pendant = new THREE.PointLight(0xfff5e0, 3, 20);
    pendant.position.set(0, HH - 0.35, 0);
    pendant.castShadow = true;
    scene.add(pendant);

    // Bulb
    var bulb = new THREE.Mesh(
      new THREE.SphereGeometry(0.12, 16, 8),
      new THREE.MeshBasicMaterial({ color: 0xfffde0 })
    );
    bulb.position.copy(pendant.position);
    scene.add(bulb);

    // Cord
    var cord = new THREE.Mesh(
      new THREE.CylinderGeometry(0.01, 0.01, 0.5),
      new THREE.MeshLambertMaterial({ color: 0x222222 })
    );
    cord.position.set(0, HH - 0.05, 0);
    scene.add(cord);

    // Fill lights
    [[-3,-1,-3],[3,-1,3],[-3,-1,3],[3,-1,-3]].forEach(function(p) {
      var l = new THREE.PointLight(0xffe4c0, 0.4, 8);
      l.position.set(p[0], p[1], p[2]);
      scene.add(l);
    });

    // ── Textures ──────────────────────────────────────────────────────────

    function wallTex(color) {
      var c = document.createElement('canvas');
      c.width = c.height = 512;
      var x = c.getContext('2d');
      x.fillStyle = color;
      x.fillRect(0, 0, 512, 512);
      for (var i = 0; i < 5000; i++) {
        var a = Math.random() * 0.035;
        x.fillStyle = Math.random() > 0.5 ? 'rgba(255,255,255,' + a + ')' : 'rgba(0,0,0,' + a + ')';
        x.fillRect(Math.random() * 512, Math.random() * 512, 2, 2);
      }
      var t = new THREE.CanvasTexture(c);
      t.wrapS = t.wrapT = THREE.RepeatWrapping;
      t.repeat.set(3, 1.5);
      return t;
    }

    function floorTex() {
      var c = document.createElement('canvas');
      c.width = c.height = 512;
      var x = c.getContext('2d');
      var PW = 128;
      for (var col = 0; col < 4; col++) {
        for (var row = 0; row < 6; row++) {
          var px = col * PW, py = row * 86;
          var hue = 28 + Math.random() * 10, lit = 30 + Math.random() * 12;
          var g = x.createLinearGradient(px, py, px + PW, py + 86);
          g.addColorStop(0, 'hsl(' + hue + ',48%,' + lit + '%)');
          g.addColorStop(0.4, 'hsl(' + (hue+3) + ',42%,' + (lit+6) + '%)');
          g.addColorStop(1, 'hsl(' + hue + ',46%,' + (lit+2) + '%)');
          x.fillStyle = g;
          x.fillRect(px + 1, py + 1, PW - 2, 84);
          x.strokeStyle = 'rgba(0,0,0,0.22)';
          x.lineWidth = 2;
          x.strokeRect(px + 1, py + 1, PW - 2, 84);
        }
      }
      var t = new THREE.CanvasTexture(c);
      t.wrapS = t.wrapT = THREE.RepeatWrapping;
      t.repeat.set(3, 3);
      return t;
    }

    function popcornTex() {
      var c = document.createElement('canvas');
      c.width = c.height = 1024;
      var x = c.getContext('2d');
      x.fillStyle = '#f0ece6';
      x.fillRect(0, 0, 1024, 1024);
      for (var i = 0; i < 4000; i++) {
        var bx = Math.random() * 1024, by = Math.random() * 1024;
        var rx = 3 + Math.random() * 7, ry = 2 + Math.random() * 5;
        var angle = Math.random() * Math.PI;
        var br = 210 + Math.floor(Math.random() * 45);
        var dk = 145 + Math.floor(Math.random() * 50);
        var g = x.createRadialGradient(bx - rx*0.3, by - ry*0.4, 0, bx, by, Math.max(rx,ry));
        g.addColorStop(0, 'rgb(' + br + ',' + br + ',' + (br-5) + ')');
        g.addColorStop(0.5, 'rgb(' + (dk+30) + ',' + (dk+25) + ',' + (dk+20) + ')');
        g.addColorStop(1, 'rgb(' + (dk-15) + ',' + (dk-20) + ',' + (dk-22) + ')');
        x.beginPath();
        x.ellipse(bx, by, rx, ry, angle, 0, Math.PI * 2);
        x.fillStyle = g;
        x.fill();
      }
      var t = new THREE.CanvasTexture(c);
      t.wrapS = t.wrapT = THREE.RepeatWrapping;
      t.repeat.set(5, 5);
      return t;
    }

    // ── Art ───────────────────────────────────────────────────────────────

    function makeArt(style) {
      var c = document.createElement('canvas');
      c.width = 512; c.height = 384;
      var x = c.getContext('2d');

      if (style === 0) {
        // Sunset
        var sky = x.createLinearGradient(0, 0, 0, 220);
        sky.addColorStop(0, '#1a2f5a');
        sky.addColorStop(0.5, '#c45a20');
        sky.addColorStop(1, '#e8a030');
        x.fillStyle = sky; x.fillRect(0, 0, 512, 220);
        var sea = x.createLinearGradient(0, 220, 0, 384);
        sea.addColorStop(0, '#1a3060'); sea.addColorStop(1, '#0a1830');
        x.fillStyle = sea; x.fillRect(0, 220, 512, 164);
        x.beginPath(); x.arc(256, 218, 38, 0, Math.PI*2);
        x.fillStyle = '#f5c842'; x.fill();
        x.fillStyle = 'rgba(245,200,66,0.3)'; x.fillRect(226,220,60,100);
        x.fillStyle = '#0d1e38';
        x.beginPath();
        x.moveTo(0,220); x.lineTo(60,160); x.lineTo(130,200);
        x.lineTo(200,140); x.lineTo(280,195); x.lineTo(360,150);
        x.lineTo(440,185); x.lineTo(512,165); x.lineTo(512,220);
        x.closePath(); x.fill();
        x.strokeStyle = 'rgba(100,160,220,0.35)'; x.lineWidth = 1.5;
        for (var wy = 245; wy < 380; wy += 14) {
          x.beginPath();
          for (var wx = 0; wx < 512; wx += 40) {
            x.moveTo(wx, wy); x.quadraticCurveTo(wx+10,wy-3,wx+20,wy); x.quadraticCurveTo(wx+30,wy+3,wx+40,wy);
          }
          x.stroke();
        }

      } else if (style === 1) {
        // Mondrian
        x.fillStyle = '#f5f0e8'; x.fillRect(0,0,512,384);
        var blocks = [
          {x:0,y:0,w:200,h:150,c:'#c8102e'},{x:210,y:0,w:150,h:100,c:'#ffd700'},
          {x:370,y:0,w:142,h:200,c:'#1a3a7c'},{x:0,y:160,w:100,h:224,c:'#1a3a7c'},
          {x:110,y:110,w:250,h:140,c:'#f5f0e8'},{x:110,y:260,w:120,h:124,c:'#c8102e'},
          {x:240,y:260,w:120,h:124,c:'#ffd700'},{x:370,y:210,w:142,h:174,c:'#f5f0e8'}
        ];
        blocks.forEach(function(b) { x.fillStyle=b.c; x.fillRect(b.x,b.y,b.w,b.h); });
        x.strokeStyle='#111'; x.lineWidth=6;
        [0,200,210,370,512].forEach(function(lx){x.beginPath();x.moveTo(lx,0);x.lineTo(lx,384);x.stroke();});
        [0,100,150,200,260,384].forEach(function(ly){x.beginPath();x.moveTo(0,ly);x.lineTo(512,ly);x.stroke();});

      } else if (style === 2) {
        // Impressionist garden
        var bg = x.createLinearGradient(0,0,0,384);
        bg.addColorStop(0,'#87b8d4'); bg.addColorStop(0.55,'#a8cce0'); bg.addColorStop(1,'#3a7a30');
        x.fillStyle=bg; x.fillRect(0,0,512,384);
        x.fillStyle='#3a7a30'; x.fillRect(0,240,512,144);
        var fc=['#e83060','#f0c030','#e05080','#80c040','#c040e0','#f08030','#40b8e0'];
        for (var fi=0;fi<300;fi++){
          x.beginPath();
          x.arc(Math.random()*512, 220+Math.random()*160, 3+Math.random()*8, 0, Math.PI*2);
          x.fillStyle=fc[Math.floor(Math.random()*fc.length)];
          x.globalAlpha=0.7+Math.random()*0.3; x.fill();
        }
        x.globalAlpha=1;
        for (var ti=0;ti<4;ti++){
          var tx=60+ti*130+(Math.random()-0.5)*20;
          x.fillStyle='#4a3020'; x.fillRect(tx-6,140,12,110);
          for(var di=0;di<70;di++){
            x.beginPath();
            x.arc(tx+(Math.random()-0.5)*60, 80+Math.random()*80, 5+Math.random()*14, 0, Math.PI*2);
            x.fillStyle='hsl('+(110+Math.random()*25)+','+(50+Math.random()*25)+'%,'+(25+Math.random()*18)+'%)';
            x.globalAlpha=0.65+Math.random()*0.35; x.fill();
          }
          x.globalAlpha=1;
        }
        x.fillStyle='rgba(200,180,130,0.45)';
        x.beginPath(); x.moveTo(220,384); x.lineTo(270,384); x.lineTo(290,240); x.lineTo(240,240); x.closePath(); x.fill();

      } else {
        // Still life flowers
        x.fillStyle='#2a1e0e'; x.fillRect(0,0,512,384);
        var bg2=x.createRadialGradient(256,180,10,256,180,280);
        bg2.addColorStop(0,'#4a3820'); bg2.addColorStop(1,'#1a1008');
        x.fillStyle=bg2; x.fillRect(0,0,512,384);
        var tbl=x.createLinearGradient(0,290,0,384);
        tbl.addColorStop(0,'#5a3c18'); tbl.addColorStop(1,'#3a2010');
        x.fillStyle=tbl; x.fillRect(0,295,512,89);
        x.fillStyle='#2244aa';
        x.beginPath(); x.ellipse(256,310,38,16,0,0,Math.PI*2); x.fill();
        x.fillRect(218,220,76,95);
        x.beginPath(); x.ellipse(256,220,38,16,0,0,Math.PI*2); x.fill();
        x.fillStyle='rgba(100,150,255,0.25)';
        x.beginPath(); x.ellipse(240,255,10,45,-0.3,0,Math.PI*2); x.fill();
        var sc=['#2a6020','#1e5018','#366828'];
        for(var si=0;si<8;si++){
          var sx2=200+si*16+(Math.random()-0.5)*12;
          x.strokeStyle=sc[si%3]; x.lineWidth=2; x.beginPath();
          x.moveTo(256,218);
          x.bezierCurveTo(256+(Math.random()-0.5)*30,160,sx2+(Math.random()-0.5)*20,100,sx2,50+Math.random()*60);
          x.stroke();
        }
        var fd=[[185,80,'#e83060'],[210,55,'#f5c030'],[240,40,'#e040a0'],
                 [265,48,'#ff6030'],[295,62,'#c050e0'],[318,75,'#f5c030'],
                 [230,95,'#e83060'],[270,90,'#40b8e0']];
        fd.forEach(function(f){
          for(var pi=0;pi<7;pi++){
            var ang=(pi/7)*Math.PI*2, pr=12+Math.random()*4;
            x.beginPath(); x.ellipse(f[0]+Math.cos(ang)*pr,f[1]+Math.sin(ang)*pr,9,6,ang,0,Math.PI*2);
            x.fillStyle=f[2]; x.globalAlpha=0.85; x.fill();
          }
          x.globalAlpha=1;
          x.beginPath(); x.arc(f[0],f[1],7,0,Math.PI*2);
          x.fillStyle='#f5e050'; x.fill();
        });
      }
      return new THREE.CanvasTexture(c);
    }

    // ── Room ──────────────────────────────────────────────────────────────

    var wc = '#ddd5c2';

    // Floor
    var floor = new THREE.Mesh(
      new THREE.PlaneGeometry(RW, RD),
      new THREE.MeshLambertMaterial({ map: floorTex() })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -HH;
    floor.receiveShadow = true;
    scene.add(floor);

    // Ceiling
    var ceil = new THREE.Mesh(
      new THREE.PlaneGeometry(RW, RD),
      new THREE.MeshLambertMaterial({ map: popcornTex() })
    );
    ceil.rotation.x = Math.PI / 2;
    ceil.position.y = HH;
    scene.add(ceil);

    // Walls
    function addWall(w, h, pos, rotY, color) {
      var m = new THREE.Mesh(
        new THREE.PlaneGeometry(w, h),
        new THREE.MeshLambertMaterial({ map: wallTex(color) })
      );
      m.position.set(pos[0], pos[1], pos[2]);
      m.rotation.y = rotY;
      m.receiveShadow = true;
      scene.add(m);
    }
    addWall(RW, RH, [0, 0, -HD],  0,            wc);
    addWall(RW, RH, [0, 0,  HD],  Math.PI,      wc);
    addWall(RD, RH, [-HW, 0, 0],  Math.PI/2,    '#d4cbb8');
    addWall(RD, RH, [ HW, 0, 0], -Math.PI/2,    '#d4cbb8');

    // Baseboard
    var baseMat = new THREE.MeshLambertMaterial({ color: 0xf5f0e8 });
    [
      { s:[RW,0.13,0.04], p:[0,-HH+0.065,-HD+0.02], r:0 },
      { s:[RW,0.13,0.04], p:[0,-HH+0.065, HD-0.02], r:Math.PI },
      { s:[RD,0.13,0.04], p:[-HW+0.02,-HH+0.065,0], r:Math.PI/2 },
      { s:[RD,0.13,0.04], p:[ HW-0.02,-HH+0.065,0], r:-Math.PI/2 },
    ].forEach(function(b) {
      var m = new THREE.Mesh(new THREE.BoxGeometry(b.s[0],b.s[1],b.s[2]), baseMat);
      m.position.set(b.p[0],b.p[1],b.p[2]); m.rotation.y = b.r; scene.add(m);
    });

    // Crown molding
    var crownMat = new THREE.MeshLambertMaterial({ color: 0xf8f4ee });
    [
      { s:[RW,0.09,0.04], p:[0, HH-0.045,-HD+0.02], r:0 },
      { s:[RW,0.09,0.04], p:[0, HH-0.045, HD-0.02], r:Math.PI },
      { s:[RD,0.09,0.04], p:[-HW+0.02,HH-0.045,0],  r:Math.PI/2 },
      { s:[RD,0.09,0.04], p:[ HW-0.02,HH-0.045,0],  r:-Math.PI/2 },
    ].forEach(function(b) {
      var m = new THREE.Mesh(new THREE.BoxGeometry(b.s[0],b.s[1],b.s[2]), crownMat);
      m.position.set(b.p[0],b.p[1],b.p[2]); m.rotation.y = b.r; scene.add(m);
    });

    // ── Paintings ─────────────────────────────────────────────────────────

    function addPainting(pos, rotY, style) {
      var PW = 2.6, PH = 1.95, FT = 0.07, FD = 0.07;
      var g = new THREE.Group();
      g.position.set(pos[0], pos[1], pos[2]);
      g.rotation.y = rotY;

      // Art
      var art = new THREE.Mesh(
        new THREE.PlaneGeometry(PW, PH),
        new THREE.MeshLambertMaterial({ map: makeArt(style) })
      );
      art.position.z = 0.02;
      g.add(art);

      // Frame
      var fm = new THREE.MeshLambertMaterial({ color: 0x2e1a0a });
      [
        { g: new THREE.BoxGeometry(PW+FT*2,FT,FD), p:[0, PH/2+FT/2, 0] },
        { g: new THREE.BoxGeometry(PW+FT*2,FT,FD), p:[0,-PH/2-FT/2, 0] },
        { g: new THREE.BoxGeometry(FT,PH,FD),       p:[-PW/2-FT/2,0,0] },
        { g: new THREE.BoxGeometry(FT,PH,FD),       p:[ PW/2+FT/2,0,0] },
      ].forEach(function(f) {
        var m = new THREE.Mesh(f.g, fm);
        m.position.set(f.p[0],f.p[1],f.p[2]); g.add(m);
      });

      // Picture light
      var lb = new THREE.Mesh(
        new THREE.BoxGeometry(0.9, 0.07, 0.12),
        new THREE.MeshLambertMaterial({ color: 0xb89a10 })
      );
      lb.position.set(0, PH/2+FT+0.13, 0.06);
      g.add(lb);

      var spot = new THREE.SpotLight(0xfff2c0, 2.5, 5, Math.PI/7, 0.4, 1.5);
      spot.position.set(0, PH/2+FT+0.22, 0.3);
      spot.target.position.set(0, -0.2, 0.8);
      g.add(spot); g.add(spot.target);

      scene.add(g);
    }

    var EYE = 0.35;
    addPainting([0, EYE, -HD+0.04],  0,           0);
    addPainting([0, EYE,  HD-0.04],  Math.PI,     1);
    addPainting([-HW+0.04, EYE, 0],  Math.PI/2,   2);
    addPainting([ HW-0.04, EYE, 0], -Math.PI/2,   3);

    // ── Loop ──────────────────────────────────────────────────────────────

    window.addEventListener('resize', function() {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    (function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    })();
  </script>
</body>
</html>
